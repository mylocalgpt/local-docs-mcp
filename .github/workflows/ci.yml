name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      - run: |
          mkdir -p npm/bin
          go build -o npm/bin/local-docs-mcp ./cmd/local-docs-mcp
      - run: npm/bin/local-docs-mcp stdio --help 2>&1 || true
