name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./cmd/local-docs-mcp
  test-npm-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Test cli.js resolves platform package
        run: |
          cd npm
          npm install --ignore-scripts
          node -e "
            const path = require('path');
            const os = require('os');
            const key = process.platform + ' ' + os.arch();
            const pkgs = {
              'darwin x64': '@local-docs-mcp/darwin-x64',
              'darwin arm64': '@local-docs-mcp/darwin-arm64',
              'linux x64': '@local-docs-mcp/linux-x64',
              'linux arm64': '@local-docs-mcp/linux-arm64',
              'win32 x64': '@local-docs-mcp/win32-x64',
            };
            const pkg = pkgs[key];
            if (!pkg) { console.error('No package for ' + key); process.exit(1); }
            const pkgJson = require.resolve(pkg + '/package.json');
            console.log('Resolved ' + pkg + ' at ' + path.dirname(pkgJson));
          "
