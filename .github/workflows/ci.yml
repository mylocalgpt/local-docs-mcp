name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./cmd/local-docs-mcp
  test-npm-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Test install.js against latest release
        run: |
          cd npm
          LATEST=$(gh release view --json tagName -q .tagName 2>/dev/null || echo "v0.1.2")
          npm version ${LATEST#v} --no-git-tag-version
          node install.js
          ./bin/local-docs-mcp list 2>&1 || true
        env:
          GH_TOKEN: ${{ github.token }}
