version: 2
builds:
  - main: ./cmd/local-docs-mcp
    binary: local-docs-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mylocalgpt/local-docs-mcp/internal/mcpserver.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: checksums.txt
changelog:
  sort: asc
